name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    name: lint, type-check, test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy

      - name: Pytest
        run: pytest

  workflow:
    name: workflow (snakemake integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with dev + pipeline extras
        run: python -m pip install -e ".[dev,pipeline]"

      # Executes the Snakemake workflow and the CLI end-to-end pipeline on the
      # tiny fixture. Snakemake lives only in the optional `pipeline` extra, so it
      # is exercised here rather than in every matrix job above.
      - name: Run workflow and integration tests
        run: pytest tests/integration tests/unit/test_workflow.py -v
