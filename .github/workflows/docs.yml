name: docs

# Build the MkDocs site and publish it to GitHub Pages using the native Pages
# Actions flow (build artifact -> deploy). Requires Pages to be enabled once in
# the repository settings: Settings -> Pages -> Build and deployment ->
# Source: "GitHub Actions".

on:
  push:
    branches: [main]
    # Only rebuild when something that affects the site changes. src/** is
    # included because the API reference is generated from the package
    # docstrings via mkdocstrings.
    paths:
      - "docs/**"
      - "src/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Least-privilege token, plus the permissions the deploy step needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      # Installs the package (so mkdocstrings can import scdecon for the API
      # reference) plus the docs toolchain.
      - name: Install package with docs extra
        run: python -m pip install -e ".[docs]"

      - name: Build site (strict)
        run: mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
